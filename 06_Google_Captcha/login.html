<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/bootstrap.min.css">

<script
src="https://www.google.com/recaptcha/api.js"
async
defer>
</script>

<style>

body{
background:#020617;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:100%;
max-width:450px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.g-recaptcha{
display:flex;
justify-content:center;
margin-bottom:20px;
}

@media(max-width:768px){

body{
padding:15px;
}

.login-box{
padding:25px;
}

.g-recaptcha{
transform:scale(.90);
transform-origin:center;
}

}

</style>

</head>

<body>

<div class="login-box">

<h2 class="text-center mb-4">

Login

</h2>

<form
action="login.php"
method="POST">

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Enter Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Enter Password"
required>

<!-- GOOGLE CAPTCHA -->

<div
class="g-recaptcha"
data-sitekey="6LeUyEAtAAAAAEAHYHzzPA3DSEBN8RKRIUprfMGG">
</div>

<button
type="submit"
class="btn btn-primary w-100">

Login

</button>

</form>

<p class="text-center mt-3">

Don't have an account?

<a
href="registration.html">

REGISTER

</a>

</p>

</div>

</body>

</html>
