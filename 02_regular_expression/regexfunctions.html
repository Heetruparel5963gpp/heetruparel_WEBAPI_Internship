<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:700px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .form-group{
            display:flex;
            gap:15px;
            margin-bottom:15px;
        }

        .input-box{
            flex:1;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        input, select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        .gender{
            display:flex;
            gap:20px;
            margin-top:10px;
        }

        .gender label{
            font-weight:normal;
        }

        .btn{
            width:100%;
            background:#4e73df;
            color:white;
            padding:12px;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
            margin-top:20px;
        }

        .btn:hover{
            background:#2e59d9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form action="regexfunctions.php" method="post">

        <div class="form-group">
            <div class="input-box">
                <label>First Name</label>
                <input type="text" name="fname" required>
            </div>

            <div class="input-box">
                <label>Middle Name</label>
                <input type="text" name="mname">
            </div>

            <div class="input-box">
                <label>Last Name</label>
                <input type="text" name="lname" required>
            </div>
        </div>

        <div class="form-group">
            <div class="input-box">
                <label>City</label>
                <input type="text" name="city" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
        </div>

        <div class="form-group">
            <div class="input-box">
                <label>Contact Number</label>
                <input type="tel" name="contact" maxlength="10" required>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <div class="gender">
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                </div>
            </div>
        </div>

        <div class="form-group">
            <div class="input-box">
                <label>Aadhar Number</label>
                <input type="text" name="aadhar" maxlength="12" required>
            </div>

            <div class="input-box">
                <label>PAN Number</label>
                <input type="text" name="pan" maxlength="10" required>
            </div>
        </div>

        <div class="form-group">
            <div class="input-box">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
        </div>

        <div class="form-group">
            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>
        </div>

        <button type="submit" class="btn">Register</button>

    </form>
</div>

</body>
</html>
