<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - API Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div id="toastContainer" class="toast-container">
            <div id="loginToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
                <div class="d-flex">
                    <div class="toast-body" id="toastMsg">
                        Login Successful!
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <h3 class="title-glow text-center">Welcome Back</h3>
                    <form id="frm">
                        <div class="mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                        <button class="btn btn-custom btn-success-custom w-100">Login</button>
                    </form>
                    <div id="msg" class="text-center mt-3 text-danger small"></div>
                    
                    <!-- Pre block to show original API response data (optional but good for debugging API) -->
                    <pre id="apiResponse" class="mt-3 p-3 bg-light rounded d-none" style="font-size: 0.8rem; overflow-x: auto; text-align: left;"></pre>

                    <div class="nav-links">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        <p><a href="index.html">Back to Home</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('frm').onsubmit = async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('msg');
            const apiRespDiv = document.getElementById('apiResponse');
            msgDiv.textContent = '';
            apiRespDiv.classList.add('d-none');
            
            try {
                let r = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                let data = await r.json();
                
                // Show raw API response for demo purposes
                apiRespDiv.classList.remove('d-none');
                apiRespDiv.textContent = JSON.stringify(data, null, 2);
                
                if (data.status) {
                    // Show success toast with 3 second timeout
                    document.getElementById('toastMsg').textContent = data.message || 'Login Successful!';
                    const toastElement = document.getElementById('loginToast');
                    const toast = new bootstrap.Toast(toastElement);
                    toast.show();
                    
                    // You can perform an action here after 3 seconds
                    setTimeout(() => {
                        // Example: window.location.href = 'index.html';
                    }, 3000);
                } else {
                    msgDiv.textContent = data.message || 'Login failed.';
                }
            } catch (error) {
                msgDiv.textContent = 'An error occurred connecting to the API.';
                console.error(error);
            }
        }
    </script>
</body>
</html>
