<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - API Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <h3 class="title-glow text-center">Create Account</h3>
                    <form id="frm">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="fullname" placeholder="Full Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                        <button class="btn btn-custom btn-primary-custom w-100">Register</button>
                    </form>
                    
                    <div id="msg" class="text-center mt-3 text-danger small"></div>
                    
                    <!-- Pre block to show original API response data -->
                    <pre id="apiResponse" class="mt-3 p-3 bg-light rounded d-none" style="font-size: 0.8rem; overflow-x: auto; text-align: left;"></pre>

                    <div class="nav-links">
                        <p>Already have an account? <a href="login.html">Login here</a></p>
                        <p><a href="index.html">Back to Home</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('frm').onsubmit = async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('msg');
            const apiRespDiv = document.getElementById('apiResponse');
            msgDiv.textContent = '';
            apiRespDiv.classList.add('d-none');
            
            try {
                let r = await fetch('api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullname: document.getElementById('fullname').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                let data = await r.json();
                
                apiRespDiv.classList.remove('d-none');
                apiRespDiv.textContent = JSON.stringify(data, null, 2);
                
                if(data.status) {
                    apiRespDiv.classList.remove('bg-light');
                    apiRespDiv.classList.add('bg-success', 'text-white', 'bg-opacity-75');
                } else {
                    apiRespDiv.classList.remove('bg-success', 'text-white', 'bg-opacity-75');
                    apiRespDiv.classList.add('bg-light');
                }
                
            } catch (error) {
                msgDiv.textContent = 'An error occurred connecting to the API.';
                console.error(error);
            }
        }
    </script>
</body>
</html>
